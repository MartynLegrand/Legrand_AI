version: '3.8'

services:
  # Backend service (FastAPI + Blender)
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: legrand-3d-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./backend/exports:/app/backend/exports
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - legrand-network

  # Frontend service (React + Vite)
  frontend:
    image: node:20-alpine
    container_name: legrand-3d-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - legrand-network

networks:
  legrand-network:
    driver: bridge
